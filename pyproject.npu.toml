# =============================================================================
# AReaL — NPU (Ascend) variant
# =============================================================================
#
# This is the NPU-specific project configuration for Ascend 910 environments.
# The base Docker image (vllm-ascend) provides: torch, torch-npu, vllm-ascend.
# Megatron-core + MindSpeed are installed from source in the Dockerfile.
# SGLang is installed from source for tool-calling imports (not used as inference engine).
#
# Usage in Docker (see Dockerfile.a2 / Dockerfile.a3):
#   uv pip install -r pyproject.npu.toml --system --group dev
#
# Usage locally (development):
#   cp pyproject.npu.toml pyproject.toml && cp uv.npu.lock uv.lock && uv sync --group dev
#
# =============================================================================

[build-system]
requires = ["uv_build>=0.9.18,<0.10.0"]
build-backend = "uv_build"

[project]
name = "areal"
description = "AReaL: A Large-Scale Asynchronous Reinforcement Learning System"
readme = "README.md"
license = {text = "Apache-2.0"}
requires-python = ">=3.11,<3.13"
version = "1.0.4"
authors = [
    {name = "AReaL Team"},
]
maintainers = [
    {name = "AReaL Team"},
]
keywords = [
    "distributed-systems",
    "reinforcement-learning",
    "large-language-models",
    "llm-training",
    "llm-agent",
    "agentic-rl",
]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: POSIX :: Linux",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: System :: Distributed Computing",
]

dependencies = [
    # Core ML/AI libraries
    # NOTE: torch, torchaudio, torchvision are provided by the vllm-ascend base image.
    # Do NOT add them here to avoid version conflicts with torch-npu.
    "torchdata",
    "huggingface_hub",
    "datasets>=3.0.0",
    "transformers==5.3.0",
    # NPU GDN/VLM runtime deps. flash-linear-attention: triton GDN ops (pin 0.5.0,
    # auto-pulls matching fla-core). nvidia-modelopt + qwen-vl-utils: needed by the
    # mindspeed adaptor / megatron-bridge.
    "flash-linear-attention==0.5.0",
    "nvidia-modelopt",
    "qwen-vl-utils==0.0.14",
    "mistral-common>=1.11.1",
    "mbridge @ git+https://github.com/ISEEKYAN/mbridge.git@08975e6",
    "peft<=0.18.1",
    "qwen_agent",
    "openai-agents",
    "anthropic",
    "claude-agent-sdk",
    "litellm[proxy]>=1.81.3",
    "openhands",
    "langchain",
    "langchain-openai",

    # Visualization
    "pandas",
    "matplotlib",
    "seaborn",

    # Utilities and data processing
    "pillow>=12.1.1",
    "pylatexenc",
    "zstandard",
    "setproctitle",
    "nltk",
    "sentencepiece",
    "einops",
    "orjson",
    "tqdm",
    "rich",
    "pydantic",
    "PyYAML",
    "omegaconf==2.4.0.dev2",
    "hydra-core==1.4.0.dev1",
    "packaging",
    "lark",
    "tabulate",
    "pybase64",
    "msgspec",
    "math-verify==0.8.0",
    "python-dotenv",
    "json5",
    "psutil",
    "ninja",
    "numba",
    "blosc",
    "pybind11>=2.10.0",
    "networkx==3.3",
    "aiofiles",
    "aiohttp>=3.13.3,<4",
    "httpx>=0.28.1",
    "pyzmq",
    "regex",
    "python_dateutil",
    "word2number",
    "pebble",
    "timeout-decorator",
    "prettytable",
    "h5py",
    "mathruler==0.1.0",

    # Monitoring and logging
    "wandb",
    "tensorboardx",
    "trackio",
    "colorama",
    "colorlog",
    "swanboard==0.1.9b1",
    "swanlab[dashboard]==0.6.12",

    # Distributed computing
    "ray[default]>=2.53.0",
    "redis",
    "awex==0.7.0",

    # Web frameworks
    # Cap starlette <1.3 (and fastapi <0.137, which pulls it): starlette 1.3
    # exposes included routers as _IncludedRouter (no `.path`), breaking
    # prometheus_fastapi_instrumentator in vLLM's API server -- every request
    # 500s, so the rollout server never reports healthy and launch times out.
    "fastapi>=0.115.12,<0.137",
    "starlette<1.3",
    "uvicorn",
    "uvloop>=0.21.0",
    "flask",
    "tenacity",

    # Build and packaging tools
    "setuptools>=77.0.3,<80",
    "build>=1.2.1",
    "wheel>=0.43.0",
    "cookiecutter>2.1.1",
    "distro-info>=1.0",
    "python-debian>=0.1.49",
]

[project.optional-dependencies]
# NPU marker extra (deps installed by Dockerfile from source)
npu = []

[project.urls]
"Homepage" = "https://github.com/inclusionAI/AReaL"
"Repository" = "https://github.com/inclusionAI/AReaL"
"Documentation" = "https://inclusionai.github.io/AReaL/en/intro.html"
"Bug Tracker" = "https://github.com/inclusionAI/AReaL/issues"

[dependency-groups]
dev = [
    "pytest",
    "pytest-asyncio",
    "ipython",
    "ruff==0.14.9",
    "clang-format==19.1.7",
    "sh",
    "mdformat==0.7.17",
    "mdformat-gfm",
    "mdformat-tables",
    "mdformat-frontmatter",
    "plotly",
    "pre-commit",
    "sphinx",
    "sphinx-nefertiti",
    "jupyter-book==1.0.4.post1",
]

# =============================================================================
# Tool configurations: uv
# =============================================================================

[tool.uv.build-backend]
module-root = ""

[tool.uv]
# NPU environments: Linux x86_64 and aarch64 only
environments = [
    "sys_platform == 'linux' and platform_machine == 'x86_64'",
    "sys_platform == 'linux' and platform_machine == 'aarch64'",
]
override-dependencies = [
    # litellm / sglang conflict resolution (same as upstream)
    "openai>=2.8.0",
    "soundfile==0.13.1",
    # General version pins
    "hydra-core==1.4.0.dev1",
    "timm==1.0.16",
]

# =============================================================================
# Tool configurations: pytest
# =============================================================================

[tool.pytest.ini_options]
pythonpath = ["."]
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::PendingDeprecationWarning",
    "ignore::FutureWarning",
    "ignore::UserWarning:torch.*",
    "ignore::UserWarning:transformers.*",
]
markers = [
    "slow: mark test as slow, expected to cost more than 30 seconds and will not run in CI by default.",
    "ci: mark test as must-run in CI (only marked for slow tests).",
    "gpu: mark test that uses a single GPU",
    "multi_gpu: mark test that uses more than one GPU",
    "sglang: mark test that requires the SGLang inference backend",
    "vllm: mark test that requires the vLLM inference backend",
]

# =============================================================================
# Tool configurations: ruff
# =============================================================================

[tool.ruff]
line-length = 88
target-version = "py311"

[tool.ruff.lint]
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # pyflakes
    "I",  # isort
    "UP", # pyupgrade
]
ignore = [
    "E501",  # E501 Line too long
]

[tool.ruff.lint.isort]
section-order = [
    "future",
    "standard-library",
    "third-party",
    "first-party",
    "areal",
    "local-folder",
]
from-first = false

[tool.ruff.lint.isort.sections]
"areal" = ["areal"]

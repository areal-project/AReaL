experiment_name: zjw-swe-colocate-aligned
trial_name: stability
seed: 42
enable_offload: true
total_train_epochs: 1000
total_train_steps: 150
tokenizer_path: ${actor.path}
should_accept_fn: examples.swe.filter_function.filter_function
post_exit_hook: cd "$AWEAGENT_ROOT" && PYTHONPATH=$PWD:$PYTHONPATH pip install -q -r requirements.txt && AENV_SYSTEM_URL=$AENV_SYSTEM_URL
  python -m aweagent.maintenance.clean_instances
cluster:
  n_nodes: 8
  n_gpus_per_node: 8
  fileroot: /path/to/experiments/flash-moe-colocate
  name_resolve:
    type: nfs
    nfs_record_root: /path/to/experiments/flash-moe-colocate/name_resolve/${experiment_name}
allocation_mode: megatron[actor]:(attn:d2p4c8|ffn:d2p4e8)|sglang[rollout]:d16t4p1
scheduler:
  type: slurm
gconfig:
  n_samples: 8
  min_new_tokens: 0
  max_new_tokens: 131071
  max_tokens: 131071
  greedy: false
  lora_name: ''
  temperature: 1.0
  top_p: 1.0
  top_k: 1000000
rollout:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  max_concurrent_rollouts: 720
  queue_size: null
  consumer_batch_size: ${train_dataset.batch_size}
  max_head_offpolicyness: 1
  enable_rollout_tracing: true
  scheduling_spec: ${actor.scheduling_spec}
  scheduling_strategy:
    type: colocation
    target: actor
  fileroot: ${cluster.fileroot}
  tokenizer_path: ${tokenizer_path}
  dump_to_file: true
  setup_timeout: 7200.0
  request_timeout: 20000.0
  request_retries: 3
  pause_grace_period: 30
  agent:
    mode: subproc
    subproc_max_workers: 128
    tool_call_parser: qwen25
    reasoning_parser: deepseek-r1
    chat_template_type: concat
    engine_max_tokens: ${gconfig.max_tokens}
    export_style: concat
    turn_discount: 1.0
    session_timeout_seconds: 7200
actor:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  path: /path/to/models/your-swe-sft-model
  init_from_scratch: false
  disable_dropout: true
  gradient_checkpointing: true
  dtype: bfloat16
  grad_reduce_dtype: float32
  mb_spec:
    n_mbs: 1
    granularity: 1
    max_tokens_per_mb: 131072
    n_mbs_divisor: 1
  optimizer:
    type: adam
    lr: 3.0e-06
    weight_decay: 0.01
    beta1: 0.9
    beta2: 0.999
    eps: 1.0e-08
    min_lr_ratio: 0.0
    lr_scheduler_type: constant
    gradient_clipping: 1.0
    warmup_steps_proportion: 0.0006544
  megatron:
    wrap_with_ddp: true
    ddp:
      grad_reduce_in_fp32: true
      overlap_grad_reduce: true
      overlap_param_gather: false
      use_distributed_optimizer: true
    use_deterministic_algorithms: true
    enable_fp32_lm_head: false
    cross_entropy_loss_fusion: false
    recompute_granularity: full
    recompute_method: uniform
    recompute_num_layers: 1
    moe_router_dtype: fp32
    moe_token_dispatcher_type: alltoall
    moe_router_bias_update_rate: 0.0
  eps_clip: 0.2
  eps_clip_higher: 0.28
  temperature: ${gconfig.temperature}
  kl_ctl: 0.0
  ppo_n_minibatches: 1
  recompute_logprob: false
  prox_logp_method: reuse_train_logp
  use_decoupled_loss: true
  discount: 1.0
  gae_lambda: 1.0
  reward_scaling: 1.0
  reward_bias: 0.0
  reward_clip: 5.0
  reward_norm:
    mean_level: group
    std_level: group
    group_size: ${gconfig.n_samples}
  adv_norm: null
  weight_update_mode: awex
  max_new_tokens: ${gconfig.max_new_tokens}
  scheduling_spec:
  - task_type: worker
    port_count: 2
    gpu: 1
    cpu: 4
    mem: 32
    image: /path/to/areal.sif
    cmd: python3 -m areal.infra.rpc.rpc_server
    env_vars:
      NCCL_TIMEOUT: 1800
      NCCL_DEBUG: WARN
      PYTORCH_CUDA_ALLOC_CONF: ''
      TRITON_CACHE_DIR: /tmp/triton_cache
      PYTHONPATH: /path/to/flash-linear-attention
      AENV_SYSTEM_URL: ''
      AWEAGENT_ROOT: /path/to/AReaL-SWEAgent
      SWE_AGENT_ROOT: ${.AWEAGENT_ROOT}
      LOG_DIR: ${cluster.fileroot}/logs/${experiment_name}/${trial_name}/agent_traces
      NCCL_P2P_PXN_LEVEL: '0'
      AWEX_COLOCATE_TIMEOUT_S: '7200'
      SGLANG_WAIT_WEIGHTS_READY_TIMEOUT: '600'
      SGLANG_ENABLE_LOGITS_PROCESSER_CHUNK: '1'
      SGLANG_LOGITS_PROCESSER_CHUNK_SIZE: '2048'
      SGLANG_ENABLE_TP_MEMORY_INBALANCE_CHECK: '0'
      AWEX_CHUNK_MB: ${oc.env:AWEX_CHUNK_MB,"2048"}
      AWEX_CHUNK_OPS: ${oc.env:AWEX_CHUNK_OPS,"128"}
      CUDA_LAUNCH_BLOCKING: ${oc.env:CUDA_LAUNCH_BLOCKING,"0"}
      LD_PRELOAD: ''
      TMS_INIT_ENABLE: '0'
      TMS_INIT_ENABLE_CPU_BACKUP: '0'
      AREAL_AWEX_METRICS_DEBUG: '1'
    additional_bash_cmds:
    - pkill -9 -f 'awex_sglang_[p]lugin' 2>/dev/null || true; pkill -9 -f 'sglang_awex_[l]auncher' 2>/dev/null || true; pkill
      -9 -f 'sglang[.]launch_server' 2>/dev/null || true; sleep 2
      $TRITON_CACHE_DIR/ 2>/dev/null || true)
    - uv pip install -e . && uv pip install torch_memory_saver
      && uv pip install memray
    - cd ${AWEAGENT_ROOT:-/path/to/AReaL-SWEAgent} && uv pip install -r requirements.txt
    - export PYTHONPATH=/path/to/flash-linear-attention:/path/to/awex:/path/to/AReaL:$PYTHONPATH
    - cd /path/to/AReaL
ref: null
econfig:
  dataset_path: ''
  agent_type: swe
  agent_config: ''
  swe_agent_config: 1_0_0/min-swe-agent-train-top1
  agent_root: /path/to/AReaL-SWEAgent
  timeout: 7200.0
sglang:
  model_path: ${actor.path}
  random_seed: ${seed}
  skip_tokenizer_init: false
  dtype: auto
  context_length: 131072
  max_prefill_tokens: 8192
  chunked_prefill_size: 8192
  max_running_requests: 128
  mem_fraction_static: 0.65
  schedule_policy: fcfs
  schedule_conservativeness: 1.0
  attention_backend: fa3
  log_level: info
  log_requests: false
  sampling_backend: pytorch
  enable_memory_saver: true
  disable_cuda_graph: false
  disable_radix_cache: false
  disable_custom_all_reduce: true
  triton_attention_num_kv_splits: 16
  enable_metrics: true
  load_format: auto
  ep_size: 1
  log_level_http: null
train_dataset:
  batch_size: 32
  shuffle: true
  pin_memory: true
  num_workers: 4
  path: /path/to/data/swe_bench_rl.jsonl
  type: rl
  max_length: 16384
  drop_last: true
valid_dataset:
  batch_size: 32
  shuffle: true
  pin_memory: true
  num_workers: 4
  path: ${train_dataset.path}
  type: rl
saver:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: 1
  freq_steps: 10
  freq_secs: null
recover:
  mode: auto
  retries: 3
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: 1
  freq_secs: 7200
  no_save_optim: true
  no_load_optim: true
  freq_steps: 10
evaluator:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: null
  freq_steps: null
  freq_secs: null
stats_logger:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  wandb:
    mode: online
    wandb_base_url: http://your-wandb-host:8080
    wandb_api_key: ${oc.env:WANDB_API_KEY,}
perf_tracer:
  enabled: false
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  session_tracer:
    enabled: false

experiment_name: ${oc.env:EXPERIMENT_NAME}
trial_name: ${oc.env:TRIAL_NAME}

seed: 42
enable_offload: false
total_train_epochs: 10
total_train_steps: 100
tokenizer_path: ${actor.path}

cluster:
  # 2 nodes x 8 GPUs: 1 for rollout (SGLang), 1 for actor (Megatron).
  n_nodes: 2
  n_gpus_per_node: 8
  fileroot: ${oc.env:AREAL_FILEROOT}
  name_resolve:
    type: nfs
    nfs_record_root: ${cluster.fileroot}/name_resolve/${experiment_name}

scheduler:
  type: slurm

gconfig:
  n_samples: 4
  min_new_tokens: 0
  max_new_tokens: 131071
  max_tokens: 131071
  greedy: false
  temperature: 1.0
  top_p: 1.0
  top_k: 1000000

rollout:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  backend: "sglang:d2t4p1"
  max_concurrent_rollouts: 32
  queue_size: null
  consumer_batch_size: ${train_dataset.batch_size}
  max_head_offpolicyness: 4
  enable_rollout_tracing: true
  scheduling_spec: ${actor.scheduling_spec}
  fileroot: ${cluster.fileroot}
  tokenizer_path: ${tokenizer_path}
  dump_to_file: true
  setup_timeout: 900.0
  request_timeout: 20000.0
  request_retries: 3
  pause_grace_period: 30
  agent:
    mode: inline
    # admin_api_key is injected by the launcher; not stored in YAML.
    admin_api_key: ${oc.env:SWE_RL_ADMIN_API_KEY}
    tool_call_parser: qwen3_coder
    reasoning_parser: qwen3
    chat_template_type: concat
    engine_max_tokens: ${gconfig.max_tokens}
    export_style: concat
    turn_discount: 1.0
    session_timeout_seconds: 3600
    prefix_matcher: examples.swe.prefix_matchers.swe_prefix_matcher
    message_preprocessors:
      - examples.swe.preprocessors.StripAnthropicBillingHeader
      - examples.swe.preprocessors.StripAllSystemReminders
      - examples.swe.preprocessors.StripAnthropicCacheFields
      - examples.swe.preprocessors.NormalizeToolCallArguments

actor:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  # attn DP1 PP1 TP2 CP4; ffn DP1 PP1 EP8. CP=4 shards long sequences.
  backend: "megatron:(attn:d1p1t2c4|ffn:d1p1e8)"
  path: ${oc.env:MODEL_PATH}
  init_from_scratch: false
  disable_dropout: true
  gradient_checkpointing: true
  dtype: bfloat16
  grad_reduce_dtype: float32
  mb_spec:
    n_mbs: 1
    granularity: 1
    max_tokens_per_mb: 131072
    n_mbs_divisor: 1
  optimizer:
    type: adam
    lr: 3.0e-6
    weight_decay: 0.01
    beta1: 0.9
    beta2: 0.999
    eps: 1.0e-8
    lr_scheduler_type: constant
    gradient_clipping: 1.0
    warmup_steps_proportion: 0.001
  megatron:
    wrap_with_ddp: true
    ddp:
      grad_reduce_in_fp32: true
      overlap_grad_reduce: true
      overlap_param_gather: false
      use_distributed_optimizer: true
    use_deterministic_algorithms: true
    enable_fp32_lm_head: false
    cross_entropy_loss_fusion: false
    recompute_granularity: full
    recompute_method: uniform
    recompute_num_layers: 1
    moe_router_dtype: fp32
    moe_token_dispatcher_type: alltoall
    moe_router_bias_update_rate: 0.0
  eps_clip: 0.2
  eps_clip_higher: 0.28
  temperature: ${gconfig.temperature}
  kl_ctl: 0.0
  ppo_n_minibatches: 1
  recompute_logprob: false
  prox_logp_method: recompute
  use_decoupled_loss: true
  rejection_sampling:
    level: token
    action: mask
    metric: ratio
    upper: 5.0
  discount: 1.0
  gae_lambda: 1.0
  reward_scaling: 1.0
  reward_bias: 0.0
  reward_clip: 5.0
  reward_norm:
    mean_level: group
    std_level: group
    group_size: ${gconfig.n_samples}
    eps: 1.0e-5
  adv_norm:
    mean_level: null
    std_level: null
  max_new_tokens: ${gconfig.max_new_tokens}
  scheduling_spec:
    - task_type: worker
      port_count: 2
      gpu: 1
      cpu: 4
      mem: 32
      nodelist: null
      exclude: null
      image: ${oc.env:AREAL_IMAGE}
      cmd: python3 -m areal.infra.rpc.rpc_server
      env_vars:
        NCCL_TIMEOUT: 600
        PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
        # Point HOME and caches at shared storage to avoid filling the
        # container's small default HOME during JIT compilation.
        HOME: "${oc.env:AREAL_CACHE_ROOT}/home"
        HF_HOME: "${oc.env:AREAL_CACHE_ROOT}/hf"
        XDG_CACHE_HOME: "${oc.env:AREAL_CACHE_ROOT}/xdg"
        PYTHONPATH: ${oc.env:AREAL_DIR}
        # Expand on the worker at launch time; do not store credentials in config.
        ARENA_OPENAPI_BASE: "$ARENA_OPENAPI_BASE"
        ARENA_OPENAPI_TOKEN: "$ARENA_OPENAPI_TOKEN"
        ARENA_LLM_API_KEY: "$ARENA_LLM_API_KEY"
        OPENAI_MODEL: "Qwen3-Coder-30B-A3B-Instruct"

ref:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  backend: ${actor.backend}
  path: ${actor.path}
  init_from_scratch: false
  disable_dropout: false
  dtype: ${actor.dtype}
  mb_spec:
    n_mbs: 1
    granularity: 1
    max_tokens_per_mb: 131072
    n_mbs_divisor: 1
  optimizer: null
  scheduling_strategy:
    type: colocation
    target: actor
  scheduling_spec: ${actor.scheduling_spec}

# Arena Stream dataset and task environment. Leave stream_id empty to use the
# first active Stream returned by GET /openapi/v1/streams.
econfig:
  dataset_source: arena
  stream_id: swe-bench-verified
  arena_base_url: ${oc.env:ARENA_OPENAPI_BASE}
  arena_request_timeout: 180.0
  arena_request_retries: 3
  arena_poll_interval: 5.0
  arena_registration_timeout: 180.0
  timeout: 3600.0

sglang:
  model_path: ${actor.path}
  random_seed: ${seed}
  skip_tokenizer_init: true
  dtype: ${actor.dtype}
  context_length: 131072
  max_prefill_tokens: 131071
  max_running_requests: 16
  mem_fraction_static: 0.85
  chunked_prefill_size: 8192
  cuda_graph_max_bs: 16
  schedule_policy: fcfs
  attention_backend: fa3
  log_level: info
  log_requests: false
  sampling_backend: pytorch
  enable_memory_saver: false
  disable_radix_cache: false
  triton_attention_num_kv_splits: 16
  disable_custom_all_reduce: true
  disable_cuda_graph: false

# Dataset paths are unused when econfig.dataset_source=arena; the data ids are
# loaded from the selected Stream before PPOTrainer starts.
train_dataset:
  batch_size: 4
  shuffle: true
  pin_memory: true
  num_workers: 4
  path: ""
  type: rl
  max_length: 32768
  drop_last: true

valid_dataset:
  batch_size: 4
  shuffle: true
  pin_memory: true
  num_workers: 4
  path: ""
  type: rl

# Utilities
saver:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: 1
  freq_steps: 10
  freq_secs: null

recover:
  mode: auto
  retries: 3
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: 1
  freq_secs: 7200
  no_save_optim: false
  no_load_optim: false
  freq_steps: 10

evaluator:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: null
  freq_steps: null
  freq_secs: null

stats_logger:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  wandb:
    mode: online
    project: ${experiment_name}
    name: ${trial_name}

perf_tracer:
  enabled: false
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  session_tracer:
    enabled: false
